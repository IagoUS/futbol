server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: cualquier ruta no encontrada → index.html (React Router)
    location / {
        try_files $uri /index.html;
    }

    # Health check para Fly
    location = /health {
        access_log off;
        return 200 '{"ok":true}';
        add_header Content-Type application/json;
    }

    # Cache largo para assets con hash
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
